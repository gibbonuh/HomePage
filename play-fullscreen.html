<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Game Launcher</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #gameFrame {
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
      background: #000;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
      text-align: center;
      padding: 20px;
    }

    #overlay.hidden { display: none; }

    .launch-btn {
      display: inline-block;
      text-decoration: none;
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      color: #111827;
      background: linear-gradient(90deg, #f59e0b, #22d3ee);
    }

    .sub {
      color: #cbd5e1;
      font-size: 0.95rem;
      max-width: 560px;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <button id="enterBtn" class="launch-btn" type="button">Enter Fullscreen</button>
    <div class="sub">If fullscreen is blocked, click the button above once and the game will continue in this tab.</div>
  </div>

  <iframe id="gameFrame" allow="fullscreen; autoplay"></iframe>

  <script>
    (function () {
      var allowed = {
        "geometry-dash-lite.html": true,
        "rocket-goal.html": true
      };

      var params = new URLSearchParams(window.location.search);
      var game = params.get("game") || "";
      if (!allowed[game]) {
        game = "geometry-dash-lite.html";
      }

      var frame = document.getElementById("gameFrame");
      frame.src = "./" + game;

      var overlay = document.getElementById("overlay");
      var enterBtn = document.getElementById("enterBtn");

      async function tryFullscreen() {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          }
        } catch (e) {
          // Ignore; user can still play without fullscreen.
        }
        overlay.classList.add("hidden");
      }

      enterBtn.addEventListener("click", tryFullscreen);

      // Attempt once on load; browsers may require explicit click.
      window.addEventListener("load", function () {
        tryFullscreen();
      });
    })();
  </script>
</body>
</html>
