<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Portal</title>
  <style>
    :root {
      --text: #f8fafc;
      --muted: #cbd5e1;
      --panel: #132548;
      --panel-2: #1a3260;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #f59e0b;
      --accent-2: #22d3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 15%, #1e3a8a 0%, transparent 28%),
        radial-gradient(circle at 90% 10%, #0891b2 0%, transparent 24%),
        linear-gradient(145deg, #020617 0%, #0f172a 52%, #111827 100%);
    }

    .page {
      width: min(1240px, 95vw);
      margin: 20px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      min-height: calc(100vh - 40px);
    }

    .main-panel {
      background: linear-gradient(145deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2vw, 1.9rem);
      letter-spacing: 0.02em;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .viewer {
      background: transparent;
      border-radius: 12px;
      overflow: hidden;
      min-height: 70vh;
      border: 0;
      position: relative;
    }

    #gameFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #000;
    }

    .home-grid {
      position: absolute;
      inset: 0;
      padding: 16px;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 160px));
      justify-content: center;
      gap: 12px;
      align-content: start;
      background: transparent;
    }

    .home-grid.hidden { display: none; }

    .home-card {
      background: transparent;
      border: 0;
      border-radius: 12px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      aspect-ratio: 1;
    }

    .home-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .home-card h2 {
      margin: 0;
      font-size: 0.86rem;
      text-align: center;
    }

    .home-card p {
      display: none;
    }

    .btn {
      border: 0;
      border-radius: 9px;
      padding: 7px 10px;
      font-weight: 700;
      font-size: 0.82rem;
      color: #111827;
      cursor: pointer;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .top-btn {
      align-self: center;
      white-space: nowrap;
    }

    .side {
      background: linear-gradient(145deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      align-content: start;
      overflow: auto;
    }

    .side h2 {
      margin: 0;
      font-size: 1.1rem;
      grid-column: 1 / -1;
    }

    .game-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.18);
      padding: 6px;
      aspect-ratio: 1;
      cursor: pointer;
      text-align: center;
      color: inherit;
    }

    .game-item.active {
      border-color: rgba(34, 211, 238, 0.9);
      background: rgba(34, 211, 238, 0.12);
    }

    .game-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .game-item-title {
      margin: 0;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .game-item-desc {
      display: none;
    }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .viewer { min-height: 60vh; }
      .side { max-height: 42vh; }
      .topbar { align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="main-panel">
      <div class="topbar">
        <div>
          <h1 id="currentTitle">Game Portal</h1>
          <p class="sub" id="currentDesc">Choose a game below or from the sidebar to play in this page.</p>
        </div>
        <button class="btn top-btn" id="fullscreenBtn" type="button">Fullscreen</button>
      </div>

      <div class="viewer">
        <iframe id="gameFrame" title="Game Player" allow="fullscreen; autoplay"></iframe>

        <div class="home-grid" id="homeGrid"></div>
      </div>
    </section>

    <aside class="side" id="gameList">
      <h2>Games</h2>
    </aside>
  </div>

  <script>
    (function () {
      var games = [
        {
          id: "gdlite",
          title: "Geometry Dash Lite",
          file: "./geometry-dash-lite.html",
          cover: "https://play-lh.googleusercontent.com/p7kWbWBFxQIrzolEqiV5uSvctLeyssZvBV7UBOX29wzZI52IdcSs4qCB_zsQJL1mt9A",
          desc: "Jump, dodge, and keep rhythm in this fast-paced platform challenge."
        },
        {
          id: "rocket",
          title: "Rocket Goal",
          file: "./rocket-goal.html",
          cover: "https://play-lh.googleusercontent.com/xYmXleDWgPjObguVDhC-hpcC8a5yP7399awTpyPdsxIzgV52VQEAndSZ9M4WhOXQQcBs248yuB_IMUKrWz061w=w600-h300-pc0xffffff-pd",
          desc: "Control your rocket and score goals with precision and speed."
        },
        {
          id: "granny",
          title: "Granny",
          file: "./granny.html",
          cover: "https://placehold.co/600x600/1f2937/e5e7eb?text=Granny",
          desc: "Survive and escape while avoiding danger in a tense horror challenge."
        },
        {
          id: "minecraft",
          title: "Minecraft",
          file: "./minecraft.html",
          cover: "https://placehold.co/600x600/14532d/e5e7eb?text=Minecraft",
          desc: "Build, explore, and craft in an open sandbox adventure."
        }
      ];

      var list = document.getElementById("gameList");
      var frame = document.getElementById("gameFrame");
      var homeGrid = document.getElementById("homeGrid");
      var currentTitle = document.getElementById("currentTitle");
      var currentDesc = document.getElementById("currentDesc");
      var viewer = document.querySelector(".viewer");
      var fullscreenBtn = document.getElementById("fullscreenBtn");

      function setActive(id) {
        var items = document.querySelectorAll(".game-item");
        items.forEach(function (el) {
          el.classList.toggle("active", el.dataset.id === id);
        });
      }

      function openGame(id) {
        var game = games.find(function (g) { return g.id === id; });
        if (!game) return;

        frame.src = game.file;
        frame.style.display = "block";
        homeGrid.classList.add("hidden");
        currentTitle.textContent = game.title;
        currentDesc.textContent = game.desc;
        setActive(id);
      }

      async function openFullscreen() {
        if (frame.style.display === "none") return;
        try {
          if (!document.fullscreenElement) {
            await viewer.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (err) {
          // Ignore fullscreen errors if browser blocks it.
        }
      }

      function renderSidebar() {
        games.forEach(function (game) {
          var item = document.createElement("button");
          item.className = "game-item";
          item.type = "button";
          item.dataset.id = game.id;
          item.innerHTML =
            '<img src="' + game.cover + '" alt="' + game.title + ' cover">' +
            '<div>' +
              '<p class="game-item-title">' + game.title + '</p>' +
              '<p class="game-item-desc">' + game.desc + '</p>' +
            '</div>';
          item.addEventListener("click", function () {
            openGame(game.id);
          });
          list.appendChild(item);
        });
      }

      function renderHomeCards() {
        games.forEach(function (game) {
          var card = document.createElement("article");
          card.className = "home-card";
          card.innerHTML =
            '<img src="' + game.cover + '" alt="' + game.title + ' cover">' +
            '<h2>' + game.title + '</h2>' +
            '<p>' + game.desc + '</p>';

          var playBtn = document.createElement("button");
          playBtn.className = "btn";
          playBtn.type = "button";
          playBtn.textContent = "Play";
          playBtn.addEventListener("click", function () {
            openGame(game.id);
          });

          card.appendChild(playBtn);
          homeGrid.appendChild(card);
        });
      }

      renderSidebar();
      renderHomeCards();
      fullscreenBtn.addEventListener("click", openFullscreen);
    })();
  </script>
</body>
</html>
