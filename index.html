<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emmett's Game Zone</title>
  <style>
    :root {
      --text: #f8fafc;
      --muted: #cbd5e1;
      --panel: #132548;
      --panel-2: #1a3260;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #f59e0b;
      --accent-2: #22d3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 15%, #1e3a8a 0%, transparent 28%),
        radial-gradient(circle at 90% 10%, #0891b2 0%, transparent 24%),
        linear-gradient(145deg, #020617 0%, #0f172a 52%, #111827 100%);
    }

    .page {
      width: min(1200px, 95vw);
      margin: 20px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      min-height: calc(100vh - 40px);
    }

    .player-panel {
      background: linear-gradient(145deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 2vw, 1.8rem);
      letter-spacing: 0.02em;
    }

    .sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      color: #111827;
      cursor: pointer;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .viewer {
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      flex: 1;
      min-height: 68vh;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    #gameFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .side {
      background: linear-gradient(145deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto;
    }

    .side h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .game-item {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 10px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.18);
      padding: 8px;
      cursor: pointer;
      text-align: left;
      color: inherit;
    }

    .game-item.active {
      border-color: rgba(34, 211, 238, 0.9);
      background: rgba(34, 211, 238, 0.12);
    }

    .game-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .game-item-title {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .game-item-desc {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.35;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .viewer {
        min-height: 60vh;
      }

      .side {
        max-height: 42vh;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="player-panel">
      <div class="topbar">
        <div>
          <h1 id="currentTitle">Emmett's Game Zone</h1>
          <p class="sub" id="currentDesc">Choose a game from the right and it loads right here in this page.</p>
        </div>
        <button class="btn" id="fullBtn" type="button">Fullscreen</button>
      </div>

      <div class="viewer" id="viewer">
        <iframe id="gameFrame" title="Game Player" allow="fullscreen; autoplay"></iframe>
      </div>
    </section>

    <aside class="side" id="gameList">
      <h2>Games</h2>
    </aside>
  </div>

  <script>
    (function () {
      var games = [
        {
          id: "gdlite",
          title: "Geometry Dash Lite",
          file: "./geometry-dash-lite.html",
          cover: "https://play-lh.googleusercontent.com/p7kWbWBFxQIrzolEqiV5uSvctLeyssZvBV7UBOX29wzZI52IdcSs4qCB_zsQJL1mt9A",
          desc: "Jump, dodge, and keep rhythm in this fast-paced platform challenge."
        },
        {
          id: "rocket",
          title: "Rocket Goal",
          file: "./rocket-goal.html",
          cover: "https://play-lh.googleusercontent.com/xYmXleDWgPjObguVDhC-hpcC8a5yP7399awTpyPdsxIzgV52VQEAndSZ9M4WhOXQQcBs248yuB_IMUKrWz061w=w600-h300-pc0xffffff-pd",
          desc: "Control your rocket and score goals with precision and speed."
        }
      ];

      var list = document.getElementById("gameList");
      var frame = document.getElementById("gameFrame");
      var currentTitle = document.getElementById("currentTitle");
      var currentDesc = document.getElementById("currentDesc");
      var fullBtn = document.getElementById("fullBtn");
      var viewer = document.getElementById("viewer");
      var activeId = "";

      function renderList() {
        games.forEach(function (game) {
          var item = document.createElement("button");
          item.className = "game-item";
          item.type = "button";
          item.dataset.id = game.id;
          item.innerHTML =
            '<img src="' + game.cover + '" alt="' + game.title + ' cover">' +
            '<div>' +
              '<p class="game-item-title">' + game.title + '</p>' +
              '<p class="game-item-desc">' + game.desc + '</p>' +
            '</div>';

          item.addEventListener("click", function () {
            loadGame(game.id);
          });

          list.appendChild(item);
        });
      }

      function loadGame(id) {
        var game = games.find(function (g) { return g.id === id; });
        if (!game) return;

        activeId = id;
        frame.src = game.file;
        currentTitle.textContent = game.title;
        currentDesc.textContent = game.desc;

        var items = document.querySelectorAll(".game-item");
        items.forEach(function (el) {
          el.classList.toggle("active", el.dataset.id === id);
        });
      }

      fullBtn.addEventListener("click", async function () {
        try {
          if (!document.fullscreenElement) {
            await viewer.requestFullscreen();
          }
        } catch (e) {
          // Ignore fullscreen rejections.
        }
      });

      renderList();
      loadGame(games[0].id);
    })();
  </script>
</body>
</html>
